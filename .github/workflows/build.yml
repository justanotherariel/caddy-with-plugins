name: Build Custom Caddy

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/caddy-build

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Get current Caddy version
        id: caddy
        run: |
          docker pull -q caddy:latest
          VERSION=$(docker run --rm caddy:latest caddy version | awk '{print $1}' | sed 's/^v//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Current Caddy version: $VERSION"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if version already exists
        id: check
        run: |
          if docker manifest inspect "${{ env.IMAGE }}:${{ steps.caddy.outputs.version }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.caddy.outputs.version }} already built, skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "New version ${{ steps.caddy.outputs.version }}, building."
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: steps.check.outputs.exists != 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.caddy.outputs.version }}
            ${{ env.IMAGE }}:latest
